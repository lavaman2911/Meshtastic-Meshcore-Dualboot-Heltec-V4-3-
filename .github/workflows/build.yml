name: Build ESP32-S3 Dualboot Selector (Clean)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. ESP-IDF setup
      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          run_args: |
            bash -lc "
              cd selector

              echo '🧹 Clean previous build'
              rm -rf build sdkconfig sdkconfig.old

              echo '🎯 Set target ESP32-S3'
              idf.py set-target esp32s3

              echo '⚙️ Build project'
              idf.py build
            "

      # 3. Upload ONLY correct ESP32-S3 artifacts
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-dualboot-selector
          path: |
            selector/build/bootloader/bootloader.bin
            selector/build/partition_table/partition-table.bin
            selector/build/ota_data_initial.bin
            selector/build/heltec_v4_selector.bin
