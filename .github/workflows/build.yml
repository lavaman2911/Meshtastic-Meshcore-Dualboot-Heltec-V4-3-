name: Build ESP32-S3 Dualboot Selector

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ESP-IDF project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          run_args: |
            cd selector
            rm -rf build sdkconfig sdkconfig.old
            idf.py set-target esp32s3
            idf.py build

      # 🔥 FIX: capture correct path dynamically
      - name: Locate build files
        run: |
          find . -name "bootloader.bin"
          find . -name "partition-table.bin"
          find . -name "ota_data_initial.bin"
          find . -name "*selector*.bin"

      # 🔥 Upload using wildcard (NO path guessing)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-build
          path: |
            **/bootloader.bin
            **/partition-table.bin
            **/ota_data_initial.bin
            **/*selector*.bin
