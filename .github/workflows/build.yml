name: Build ESP32-S3 Dualboot Selector

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. ESP-IDF setup
      - name: Setup ESP-IDF
        id: espidf
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2

      # 3. Build (IMPORTANT: single shell context)
      - name: Build selector
        shell: bash
        run: |
          bash -lc "
            cd selector
            idf.py set-target esp32s3
            idf.py build -v
          "

      # 4. Upload build artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selector-build
          path: |
            selector/build/bootloader/bootloader.bin
            selector/build/partition_table/partition-table.bin
            selector/build/heltec_v4_selector.bin
            selector/build/ota_data_initial.bin
