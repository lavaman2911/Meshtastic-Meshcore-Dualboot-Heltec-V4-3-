name: Build ESP32-S3 Dualboot Selector (Stable)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Build ESP-IDF project
      - name: Build selector
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          run_args: |
            cd selector

            rm -rf build sdkconfig sdkconfig.old

            idf.py set-target esp32s3
            idf.py build

            echo "Build output:"
            ls -R build

      # Upload artifacts
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-dualboot-selector
          path: |
            selector/build/bootloader/bootloader.bin
            selector/build/partition_table/partition-table.bin
            selector/build/ota_data_initial.bin
            selector/build/heltec_v4_selector.bin
