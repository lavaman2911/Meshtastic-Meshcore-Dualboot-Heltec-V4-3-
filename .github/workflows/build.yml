name: Build ESP32-S3 Dualboot Selector (Stable)

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # ESP-IDF setup + build
      - name: Build ESP32-S3 project
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.2
          command: |
            bash -lc "
              set -e

              cd selector

              echo '🧹 Cleaning old build'
              rm -rf build sdkconfig sdkconfig.old

              echo '🎯 Setting target ESP32-S3'
              idf.py set-target esp32s3

              echo '⚙️ Building project'
              idf.py build

              echo '📦 Listing output files'
              find build -type f -name '*.bin' -o -name '*.elf'
            "

      # Upload artifacts (FIXED PATH)
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-dualboot-selector
          path: |
            selector/build/bootloader/bootloader.bin
            selector/build/partition_table/partition-table.bin
            selector/build/ota_data_initial.bin
            selector/build/heltec_v4_selector.bin
